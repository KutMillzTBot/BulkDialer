<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KUT MILLZ | PRO DIALER v9</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000;
            color: #fff;
            height: 100vh;
            height: -webkit-fill-available;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-touch { transition: all 0.1s ease; cursor: pointer; user-select: none; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.7; }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; width: 100%; max-width: 300px; }
        .numpad-key { background: #111; aspect-ratio: 1/1; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #222; }
        .numpad-key .num { font-size: 1.8rem; font-weight: 600; }

        .tab-content { display: none; flex: 1; overflow-y: auto; padding: 20px; }
        .tab-content.active { display: flex; flex-direction: column; }
        .nav-icon.active { color: #818cf8; background: #1e1b4b; }

        /* Status Animations */
        .pulse-indigo { animation: pulse 1.5s infinite; }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- AUTH LOCK -->
    <div id="lockscreen" class="fixed inset-0 z-[500] bg-black flex flex-col items-center justify-center p-8">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-indigo-600 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl shadow-indigo-500/20">
                <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-black tracking-tighter italic">KUT MILLZ PRO</h1>
        </div>
        <div class="flex gap-4 mb-10">
            <div id="pin-1" class="w-4 h-4 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-2" class="w-4 h-4 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-3" class="w-4 h-4 rounded-full border-2 border-zinc-800"></div>
        </div>
        <div class="numpad-grid">
            <button onclick="inputPin('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
            <button onclick="inputPin('2')" class="numpad-key btn-touch"><span class="num">2</span></button>
            <button onclick="inputPin('3')" class="numpad-key btn-touch"><span class="num">3</span></button>
            <button onclick="inputPin('4')" class="numpad-key btn-touch"><span class="num">4</span></button>
            <button onclick="inputPin('5')" class="numpad-key btn-touch"><span class="num">5</span></button>
            <button onclick="inputPin('6')" class="numpad-key btn-touch"><span class="num">6</span></button>
            <button onclick="inputPin('7')" class="numpad-key btn-touch"><span class="num">7</span></button>
            <button onclick="inputPin('8')" class="numpad-key btn-touch"><span class="num">8</span></button>
            <button onclick="inputPin('9')" class="numpad-key btn-touch"><span class="num">9</span></button>
            <button onclick="clearPin()" class="flex items-center justify-center text-zinc-600 btn-touch"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z"></path></svg></button>
            <button onclick="inputPin('0')" class="numpad-key btn-touch"><span class="num">0</span></button>
        </div>
    </div>

    <!-- PROVIDER SELECTOR -->
    <div id="providerModal" class="hidden fixed inset-0 z-[600] bg-black/95 flex items-center justify-center p-6">
        <div class="w-full max-w-sm bg-zinc-950 border border-zinc-800 p-8 rounded-[2rem]">
            <div class="text-center mb-8">
                <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-1">Incoming Dispatch</p>
                <h3 id="targetNumber" class="text-3xl font-black text-white tracking-tighter">---</h3>
            </div>
            <div class="space-y-4">
                <button onclick="dispatchCall('native')" class="w-full p-6 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-5 btn-touch">
                    <div class="w-12 h-12 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center">
                        <svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <div class="text-left"><p class="text-sm font-black text-white">SYSTEM DIALER</p></div>
                </button>
                <button onclick="dispatchCall('gv')" class="w-full p-6 rounded-2xl bg-indigo-600 border border-indigo-400 flex items-center gap-5 btn-touch">
                    <div class="w-12 h-12 bg-white/20 text-white rounded-xl flex items-center justify-center">
                        <svg class="w-7 h-7" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
                    </div>
                    <div class="text-left"><p class="text-sm font-black text-white">GOOGLE VOICE</p></div>
                </button>
                <button onclick="cancelCall()" class="w-full py-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest mt-4">Abort Call</button>
            </div>
        </div>
    </div>

    <!-- APP HEADER -->
    <header class="h-20 border-b border-zinc-900 px-6 flex items-center justify-between shrink-0">
        <div class="flex items-center gap-4">
            <div id="statusPulse" class="w-2.5 h-2.5 rounded-full bg-emerald-500"></div>
            <span id="statusText" class="text-xs font-black uppercase tracking-tighter">Ready</span>
        </div>
        <button onclick="document.getElementById('fileIn').click()" class="bg-white text-black text-[10px] font-black px-5 py-2.5 rounded-full uppercase">Import Batch</button>
        <input type="file" id="fileIn" class="hidden" accept=".xlsx,.xls">
    </header>

    <!-- MAIN VIEW -->
    <main class="flex-1 overflow-hidden relative">
        <!-- DIALER TAB -->
        <div id="tab-dialer" class="tab-content active">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-xs font-black text-zinc-500 uppercase tracking-widest">Live Queue</h2>
                <div class="flex items-center gap-2 bg-zinc-900 p-1 rounded-lg">
                    <span class="text-[9px] font-bold px-2 text-zinc-500">DELAY:</span>
                    <input type="number" id="cooldownVal" value="4" class="w-10 bg-black text-white text-[10px] text-center font-bold py-1 rounded">
                </div>
            </div>
            <div id="queueList" class="flex-1 space-y-3 overflow-y-auto pr-2">
                <div class="h-full flex flex-col items-center justify-center opacity-20 italic">No Batch Loaded</div>
            </div>
            <div class="pt-6">
                <button id="masterToggle" disabled onclick="toggleAutomation()" class="w-full py-5 rounded-3xl bg-zinc-900 text-zinc-600 font-black text-sm uppercase tracking-widest transition-all">Start Sequence</button>
            </div>
        </div>

        <!-- KEYPAD TAB -->
        <div id="tab-keypad" class="tab-content items-center justify-center">
            <input type="text" id="dialDisplay" readonly class="w-full bg-transparent text-5xl font-black text-center mb-10 outline-none" placeholder="0">
            <div class="numpad-grid mb-10">
                <button onclick="pressKey('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
                <button onclick="pressKey('2')" class="numpad-key btn-touch"><span class="num">2</span></button>
                <button onclick="pressKey('3')" class="numpad-key btn-touch"><span class="num">3</span></button>
                <button onclick="pressKey('4')" class="numpad-key btn-touch"><span class="num">4</span></button>
                <button onclick="pressKey('5')" class="numpad-key btn-touch"><span class="num">5</span></button>
                <button onclick="pressKey('6')" class="numpad-key btn-touch"><span class="num">6</span></button>
                <button onclick="pressKey('7')" class="numpad-key btn-touch"><span class="num">7</span></button>
                <button onclick="pressKey('8')" class="numpad-key btn-touch"><span class="num">8</span></button>
                <button onclick="pressKey('9')" class="numpad-key btn-touch"><span class="num">9</span></button>
                <button onclick="pressKey('*')" class="numpad-key btn-touch"><span class="num">*</span></button>
                <button onclick="pressKey('0')" class="numpad-key btn-touch"><span class="num">0</span></button>
                <button onclick="pressKey('#')" class="numpad-key btn-touch"><span class="num">#</span></button>
            </div>
            <div class="flex gap-8 items-center">
                <button onclick="clearDial()" class="text-zinc-600"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"></path></svg></button>
                <button onclick="manualDial()" class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center btn-touch shadow-xl shadow-emerald-500/20"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg></button>
                <button onclick="clearDial()" class="opacity-0"><svg class="w-8 h-8" fill="none" viewBox="0 0 24 24"></svg></button>
            </div>
        </div>

        <!-- REPO TAB -->
        <div id="tab-repo" class="tab-content">
            <h2 class="text-xs font-black text-zinc-500 uppercase tracking-widest mb-6">Archive</h2>
            <div id="batchGrid" class="space-y-4"></div>
        </div>
    </main>

    <!-- FOOTER -->
    <nav class="h-24 bg-zinc-950 border-t border-zinc-900 flex items-center justify-around pb-6 shrink-0">
        <button onclick="switchTab('dialer')" id="btn-dialer" class="nav-icon active p-4 rounded-2xl btn-touch"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg></button>
        <button onclick="switchTab('keypad')" id="btn-keypad" class="nav-icon p-4 rounded-2xl btn-touch"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
        <button onclick="switchTab('repo')" id="btn-repo" class="nav-icon p-4 rounded-2xl btn-touch"><svg class="w-7 h-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg></button>
    </nav>

    <script>
        // Engine State
        const PIN_REQ = "666";
        let curPin = "";
        let leads = [];
        let index = 0;
        let isRunning = false;
        let waitingForFocus = false;
        let pendingPhone = "";
        let dialStr = "";
        let repo = JSON.parse(localStorage.getItem('km_v9_repo')) || [];

        // Auth
        function inputPin(n) {
            if (curPin.length < 3) {
                curPin += n;
                document.getElementById(`pin-${curPin.length}`).classList.add('bg-indigo-500', 'border-indigo-500');
                if (curPin.length === 3) setTimeout(() => curPin === PIN_REQ ? unlock() : clearPin(), 200);
            }
        }
        function clearPin() { curPin = ""; for(let i=1; i<=3; i++) document.getElementById(`pin-${i}`).className = "w-4 h-4 rounded-full border-2 border-zinc-800"; }
        function unlock() { document.getElementById('lockscreen').style.display = 'none'; }

        // THE CALL ENGINE
        function dispatchCall(type) {
            document.getElementById('providerModal').classList.add('hidden');
            
            if(type === 'gv') {
                // APP PROTOCOL INJECTION: 
                //googlevoice:// opens the app and initiates the dial sequence on mobile.
                //If on desktop, we use a custom intent to call through the browser handler.
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                
                if (isMobile) {
                    window.location.assign(`googlevoice://call?number=${pendingPhone}`);
                } else {
                    // Desktop fallback - triggers the browser-signed session
                    window.open(`https://voice.google.com/u/0/calls?number=${pendingPhone}`, '_self');
                }
            } else {
                window.location.assign(`tel:${pendingPhone}`);
            }

            if (isRunning) {
                waitingForFocus = true;
                updateStatus('IN CALL', 'bg-amber-500 pulse-indigo');
            }
        }

        // VISIBILITY RESUME ENGINE
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning && waitingForFocus) {
                waitingForFocus = false;
                leads[index].status = 'done';
                index++;
                renderLeads();
                if (index < leads.length) {
                    let s = parseInt(document.getElementById('cooldownVal').value) || 4;
                    updateStatus(`DELAY ${s}s`, 'bg-indigo-500');
                    setTimeout(() => {
                        if(isRunning) startCall(leads[index].phone);
                    }, s * 1000);
                } else stopAuto();
            }
        });

        function startCall(phone) {
            pendingPhone = String(phone).replace(/[^0-9+]/g, '');
            document.getElementById('targetNumber').innerText = pendingPhone;
            document.getElementById('providerModal').classList.remove('hidden');
        }

        function toggleAutomation() {
            if(!isRunning) {
                isRunning = true;
                document.getElementById('masterToggle').innerText = "STOP ENGINE";
                document.getElementById('masterToggle').classList.replace('bg-indigo-600', 'bg-rose-600');
                startCall(leads[index].phone);
            } else stopAuto();
        }

        function stopAuto() {
            isRunning = false;
            waitingForFocus = false;
            document.getElementById('masterToggle').innerText = "RESUME ENGINE";
            document.getElementById('masterToggle').className = "w-full py-5 rounded-3xl bg-indigo-600 text-white font-black text-sm uppercase shadow-2xl shadow-indigo-500/20";
            updateStatus('READY', 'bg-emerald-500');
        }

        // TABS & UI
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`btn-${t}`).classList.add('active');
            if(t === 'repo') renderRepo();
        }

        document.getElementById('fileIn').addEventListener('change', (e) => {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                saveBatch(`BATCH_${Date.now().toString().slice(-4)}`, json);
                loadLeads(json);
            };
            reader.readAsArrayBuffer(f);
        });

        function loadLeads(data) {
            leads = data.map(r => ({ name: r.name || r.Name || "Client", phone: String(r.phone || r.Phone || ""), status: 'pending' })).filter(l => l.phone.length > 5);
            index = 0;
            renderLeads();
            const btn = document.getElementById('masterToggle');
            btn.disabled = false;
            btn.className = "w-full py-5 rounded-3xl bg-indigo-600 text-white font-black text-sm uppercase shadow-xl";
            switchTab('dialer');
        }

        function renderLeads() {
            const list = document.getElementById('queueList');
            list.innerHTML = '';
            leads.forEach((l, i) => {
                const active = i === index;
                const row = document.createElement('div');
                row.className = `p-5 rounded-2xl border flex justify-between items-center ${active ? 'bg-indigo-600/10 border-indigo-500' : 'bg-zinc-950 border-zinc-900 opacity-40'}`;
                row.innerHTML = `<div><p class="text-xs font-black uppercase">${l.name}</p><p class="text-[11px] font-mono text-zinc-500">${l.phone}</p></div>${l.status === 'done' ? '<span class="text-[9px] font-black text-emerald-500">COMPLETE</span>' : ''}`;
                list.appendChild(row);
            });
        }

        function saveBatch(name, data) { repo.push({ name, data, id: Date.now() }); localStorage.setItem('km_v9_repo', JSON.stringify(repo)); }
        function renderRepo() {
            const grid = document.getElementById('batchGrid');
            grid.innerHTML = '';
            repo.forEach((b, i) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 p-6 rounded-2xl flex justify-between items-center";
                card.innerHTML = `<div><p class="text-xs font-black uppercase">${b.name}</p><p class="text-[10px] text-zinc-500">${b.data.length} Records</p></div><button onclick="loadLeads(repo[${i}].data)" class="bg-indigo-600 text-[10px] font-black px-5 py-2 rounded-full uppercase">Load</button>`;
                grid.appendChild(card);
            });
        }

        function pressKey(v) { dialStr += v; document.getElementById('dialDisplay').value = dialStr; }
        function clearDial() { dialStr = ""; document.getElementById('dialDisplay').value = "0"; }
        function manualDial() { if(dialStr.length > 2) startCall(dialStr); }
        function updateStatus(txt, cls) { document.getElementById('statusText').innerText = txt; document.getElementById('statusPulse').className = `w-2.5 h-2.5 rounded-full ${cls}`; }
        function cancelCall() { document.getElementById('providerModal').classList.add('hidden'); if(isRunning) stopAuto(); }
    </script>
</body>
</html>
