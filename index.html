<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kut Dialer - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: black;
            color: white;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .active-tab-btn { color: #10b981 !important; }
        .active-dial-btn { background-color: #10b981 !important; color: black !important; transform: scale(1.1); }
        
        .hide { display: none !important; }
        
        .keypad-btn:active { background-color: #3f3f46; }
        
        input::placeholder { color: #27272a; }

        /* Custom scrollbar for logs */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #27272a; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col h-screen overflow-hidden">

    <!-- Top Status Bar -->
    <div class="h-12 flex items-center justify-between px-6 bg-zinc-900/50 backdrop-blur-md border-b border-zinc-800 shrink-0">
        <div class="flex items-center gap-2">
            <div id="status-dot" class="w-2 h-2 rounded-full bg-emerald-500"></div>
            <span id="status-text" class="text-xs font-medium text-zinc-400 uppercase tracking-tighter">System Ready</span>
        </div>
        <div class="text-xs text-zinc-500 font-mono">v1.1.4-HTML</div>
    </div>

    <!-- Main Content Area -->
    <main class="flex-1 overflow-y-auto pb-24 custom-scroll">
        
        <!-- DIALER TAB -->
        <div id="tab-dialer" class="p-6 flex flex-col items-center max-w-md mx-auto animate-in fade-in duration-300">
            
            <!-- Lead Info Card -->
            <div id="lead-card" class="w-full bg-zinc-900/80 border border-emerald-500/30 rounded-3xl p-5 mb-6 hide">
                <div class="flex justify-between items-start mb-4">
                    <div class="flex-1">
                        <h3 id="lead-name" class="text-xl font-bold text-white flex items-center gap-2 break-words">
                            <i data-lucide="user" class="text-emerald-500 w-5 h-5"></i>
                            <span>Loading...</span>
                        </h3>
                        <p id="lead-address" class="text-zinc-500 text-sm flex items-center gap-1 mt-1">
                            <i data-lucide="map-pin" class="w-3 h-3"></i> <span>No Address</span>
                        </p>
                    </div>
                    <div id="lead-age-badge" class="bg-emerald-500/20 text-emerald-400 px-3 py-1 rounded-full text-xs font-bold shrink-0 ml-2 hide">
                        Age: <span id="lead-age"></span>
                    </div>
                </div>
                <div class="flex items-center justify-between text-xs text-zinc-500 border-t border-zinc-800 pt-3">
                    <div class="flex gap-2">
                        <button onclick="prevLead()" id="btn-prev" class="px-2 py-1 rounded bg-zinc-800 text-[10px] disabled:opacity-30">PREV</button>
                        <button onclick="nextLead()" id="btn-next" class="px-2 py-1 rounded bg-zinc-800 text-[10px] disabled:opacity-30">NEXT</button>
                    </div>
                    <span id="lead-counter">0 / 0</span>
                    <button onclick="clearLeads()" class="text-red-400 flex items-center gap-1 hover:text-red-300">
                        <i data-lucide="x" class="w-3 h-3"></i> Clear
                    </button>
                </div>
            </div>

            <!-- Number Display -->
            <div class="w-full mb-6 text-center pt-4">
                <input 
                    id="phone-input"
                    type="text" 
                    placeholder="Enter Number"
                    class="w-full bg-transparent text-4xl font-light text-center outline-none placeholder:text-zinc-800 text-emerald-400 tracking-wider"
                >
            </div>

            <!-- Keypad -->
            <div class="grid grid-cols-3 gap-5 mb-6">
                <button onclick="appendNum('1')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">1</span><span class="text-[10px] text-zinc-400 uppercase"></span></button>
                <button onclick="appendNum('2')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">2</span><span class="text-[10px] text-zinc-400 uppercase">ABC</span></button>
                <button onclick="appendNum('3')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">3</span><span class="text-[10px] text-zinc-400 uppercase">DEF</span></button>
                <button onclick="appendNum('4')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">4</span><span class="text-[10px] text-zinc-400 uppercase">GHI</span></button>
                <button onclick="appendNum('5')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">5</span><span class="text-[10px] text-zinc-400 uppercase">JKL</span></button>
                <button onclick="appendNum('6')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">6</span><span class="text-[10px] text-zinc-400 uppercase">MNO</span></button>
                <button onclick="appendNum('7')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">7</span><span class="text-[10px] text-zinc-400 uppercase">PQRS</span></button>
                <button onclick="appendNum('8')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">8</span><span class="text-[10px] text-zinc-400 uppercase">TUV</span></button>
                <button onclick="appendNum('9')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">9</span><span class="text-[10px] text-zinc-400 uppercase">WXYZ</span></button>
                <button onclick="setPhone('')" class="flex items-center justify-center w-16 h-16 rounded-full text-zinc-500 hover:text-red-400"><i data-lucide="trash-2"></i></button>
                <button onclick="appendNum('0')" class="keypad-btn flex flex-col items-center justify-center w-16 h-16 rounded-full bg-zinc-800 transition-colors"><span class="text-2xl font-semibold">0</span><span class="text-[10px] text-zinc-400 uppercase">+</span></button>
                <button onclick="backspace()" class="flex items-center justify-center w-16 h-16 rounded-full text-zinc-500"><i data-lucide="x"></i></button>
            </div>

            <!-- Controls -->
            <div class="w-full space-y-4 px-2">
                <div class="flex gap-3">
                    <label class="flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl bg-zinc-900 border border-zinc-800 text-sm font-medium hover:bg-zinc-800 cursor-pointer">
                        <i data-lucide="upload" class="text-emerald-500 w-4 h-4"></i>
                        <span id="import-text">Import XLSX</span>
                        <input type="file" id="file-input" accept=".xlsx, .xls" class="hidden">
                    </label>
                    <button id="toggle-autodial" onclick="toggleAutoDial()" class="flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl border bg-zinc-900 border-zinc-800 text-zinc-500 text-sm font-medium transition-all">
                        <i data-lucide="file-text" class="w-4 h-4"></i> <span id="autodial-label">Auto OFF</span>
                    </button>
                </div>

                <button id="btn-dial" onclick="handleDial()" class="w-full py-5 rounded-3xl flex items-center justify-center gap-3 bg-emerald-500 text-black font-bold text-lg hover:bg-emerald-400 transition-all active:scale-95 shadow-xl">
                    <i data-lucide="phone" class="w-6 h-6 fill-current"></i>
                    PLACE CALL
                </button>
            </div>
        </div>

        <!-- HISTORY TAB -->
        <div id="tab-history" class="p-6 space-y-6 hide animate-in fade-in duration-300">
            <h2 class="text-2xl font-bold px-2">Call History</h2>
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-emerald-500/70">Total Calls</span>
                    <div id="stat-calls" class="text-3xl font-mono mt-1">0</div>
                </div>
                <div class="bg-zinc-900 p-4 rounded-2xl border border-zinc-800">
                    <span class="text-[10px] uppercase font-bold tracking-widest text-emerald-500/70">Progress</span>
                    <div id="stat-progress" class="text-3xl font-mono mt-1">0%</div>
                </div>
            </div>
            <div class="bg-zinc-900 rounded-3xl border border-zinc-800 overflow-hidden">
                <div class="p-4 border-b border-zinc-800 flex justify-between items-center">
                    <h3 class="text-xs font-bold uppercase tracking-widest text-zinc-400">Recent Logs</h3>
                    <button onclick="clearLogs()" class="text-[10px] text-red-500 uppercase font-bold">Clear All</button>
                </div>
                <div id="logs-container" class="divide-y divide-zinc-800 max-h-[400px] overflow-y-auto custom-scroll">
                    <!-- Logs injected here -->
                </div>
            </div>
        </div>

        <!-- SETTINGS TAB -->
        <div id="tab-settings" class="p-6 space-y-8 hide animate-in fade-in duration-300">
            <h2 class="text-2xl font-bold px-2">Setup</h2>
            <section>
                <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest ml-2 mb-3 block">Cooldown Duration</label>
                <div class="flex bg-zinc-900 rounded-2xl p-1 border border-zinc-800">
                    <button onclick="setCooldown(15)" id="cd-15" class="flex-1 py-3 rounded-xl text-sm font-bold text-zinc-500">15s</button>
                    <button onclick="setCooldown(30)" id="cd-30" class="flex-1 py-3 rounded-xl text-sm font-bold text-zinc-500">30s</button>
                    <button onclick="setCooldown(45)" id="cd-45" class="flex-1 py-3 rounded-xl text-sm font-bold text-zinc-500">45s</button>
                    <button onclick="setCooldown(60)" id="cd-60" class="flex-1 py-3 rounded-xl text-sm font-bold text-zinc-500">60s</button>
                </div>
            </section>
            <section class="space-y-3">
                <label class="text-xs font-bold text-zinc-500 uppercase tracking-widest ml-2 block">Application Routing</label>
                <div class="bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden">
                    <button onclick="openAppPicker()" class="w-full px-4 py-4 flex items-center justify-between hover:bg-zinc-800">
                        <div class="flex items-center gap-3"><i data-lucide="phone" class="text-zinc-400 w-5 h-5"></i><span class="text-sm">Call Provider</span></div>
                        <div class="flex items-center gap-2 text-emerald-500"><span id="provider-label" class="text-xs font-bold uppercase">Standard</span><i data-lucide="chevron-right" class="w-4 h-4"></i></div>
                    </button>
                    <button onclick="wipeData()" class="w-full px-4 py-4 flex items-center gap-3 text-red-500 hover:bg-red-500/10 transition-colors">
                        <i data-lucide="trash-2" class="w-5 h-5"></i><span class="text-sm">Factory Reset Dialer</span>
                    </button>
                </div>
            </section>
        </div>
    </main>

    <!-- Modal: App Picker -->
    <div id="modal-picker" class="fixed inset-0 z-50 flex items-end justify-center bg-black/80 backdrop-blur-sm p-4 hide">
        <div class="w-full max-w-sm bg-zinc-900 rounded-3xl border border-zinc-800 p-6">
            <h3 class="text-xl font-bold mb-2">Choose Connection</h3>
            <p class="text-zinc-400 text-sm mb-6">Select your preferred routing app.</p>
            <div class="space-y-3">
                <button onclick="selectProvider('googlevoice')" class="w-full p-4 rounded-2xl bg-emerald-500 text-black font-bold flex items-center justify-between">Google Voice <i data-lucide="chevron-right"></i></button>
                <button onclick="selectProvider('phone')" class="w-full p-4 rounded-2xl bg-zinc-800 text-white font-bold flex items-center justify-between">Default Phone App <i data-lucide="chevron-right"></i></button>
            </div>
            <button onclick="closeAppPicker()" class="w-full mt-4 text-zinc-500 text-xs py-2">CANCEL</button>
        </div>
    </div>

    <!-- Navigation Tab Bar -->
    <nav class="fixed bottom-0 w-full h-20 bg-zinc-900/80 backdrop-blur-xl border-t border-zinc-800 px-6 flex items-center justify-around pb-4 shrink-0">
        <button onclick="switchTab('history')" id="nav-history" class="flex flex-col items-center gap-1 text-zinc-600">
            <i data-lucide="bar-chart-2"></i><span class="text-[10px] uppercase font-bold tracking-tighter">History</span>
        </button>
        <button onclick="switchTab('dialer')" id="nav-dialer" class="relative -top-4 w-16 h-16 rounded-full flex items-center justify-center active-dial-btn shadow-2xl bg-zinc-800 text-zinc-400">
            <i data-lucide="phone"></i>
        </button>
        <button onclick="switchTab('settings')" id="nav-settings" class="flex flex-col items-center gap-1 text-zinc-600">
            <i data-lucide="settings"></i><span class="text-[10px] uppercase font-bold tracking-tighter">Setup</span>
        </button>
    </nav>

    <script>
        // --- State Management ---
        let leads = JSON.parse(localStorage.getItem('kut_campaignLeads')) || [];
        let currentIdx = parseInt(localStorage.getItem('kut_currentLeadIdx')) || 0;
        let callLogs = JSON.parse(localStorage.getItem('kut_callLogs')) || [];
        let cooldownDuration = parseInt(localStorage.getItem('kut_cooldownDuration')) || 30;
        let autoDialEnabled = localStorage.getItem('kut_autoDialEnabled') === 'true';
        let preferredDialer = localStorage.getItem('kut_preferredDialer') || null;
        
        let remainingCooldown = 0;
        let cooldownTimer = null;
        let activeTab = 'dialer';

        // --- Init ---
        function init() {
            lucide.createIcons();
            updateUI();
            updateSettingsUI();
            
            document.getElementById('file-input').addEventListener('change', handleFileUpload);
            document.getElementById('phone-input').addEventListener('input', (e) => savePhone(e.target.value));
        }

        // --- Logic Handlers ---
        function updateUI() {
            // Lead Card
            const card = document.getElementById('lead-card');
            if (leads.length > 0 && leads[currentIdx]) {
                const lead = leads[currentIdx];
                card.classList.remove('hide');
                document.getElementById('lead-name').querySelector('span').innerText = `${lead.firstName} ${lead.lastName}`.trim() || 'No Name Found';
                document.getElementById('lead-address').querySelector('span').innerText = lead.address || 'No Address';
                document.getElementById('lead-counter').innerText = `${currentIdx + 1} / ${leads.length}`;
                
                if (lead.age) {
                    document.getElementById('lead-age-badge').classList.remove('hide');
                    document.getElementById('lead-age').innerText = lead.age;
                } else {
                    document.getElementById('lead-age-badge').classList.add('hide');
                }
                
                document.getElementById('phone-input').value = lead.phone;
                document.getElementById('btn-prev').disabled = (currentIdx === 0);
                document.getElementById('btn-next').disabled = (currentIdx >= leads.length - 1);
            } else {
                card.classList.add('hide');
            }

            // Stats
            document.getElementById('stat-calls').innerText = callLogs.length;
            const progress = leads.length > 0 ? Math.round(((currentIdx + 1) / leads.length) * 100) : 0;
            document.getElementById('stat-progress').innerText = progress + '%';

            // Logs
            const container = document.getElementById('logs-container');
            container.innerHTML = callLogs.length === 0 ? '<div class="p-12 text-center text-zinc-600 italic text-sm">No activity recorded</div>' : '';
            callLogs.forEach(log => {
                const row = document.createElement('div');
                row.className = "p-4 flex items-center justify-between hover:bg-zinc-800/50 transition-colors";
                row.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-white font-bold text-sm">${log.name}</span>
                        <span class="text-emerald-400 font-mono text-xs">${log.phoneNumber}</span>
                    </div>
                    <div class="text-right flex flex-col items-end">
                        <i data-lucide="check-circle" class="text-emerald-500 w-4 h-4 mb-1"></i>
                        <span class="text-[9px] text-zinc-500 uppercase">${new Date(log.timestamp).toLocaleTimeString()}</span>
                    </div>
                `;
                container.appendChild(row);
            });
            lucide.createIcons();

            // AutoDial Label
            const adLabel = document.getElementById('autodial-label');
            const adBtn = document.getElementById('toggle-autodial');
            if (autoDialEnabled) {
                adLabel.innerText = "Auto ON";
                adBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl border bg-emerald-500/10 border-emerald-500 text-emerald-500 text-sm font-medium transition-all";
            } else {
                adLabel.innerText = "Auto OFF";
                adBtn.className = "flex-1 flex items-center justify-center gap-2 py-3 rounded-2xl border bg-zinc-900 border-zinc-800 text-zinc-500 text-sm font-medium transition-all";
            }
        }

        function updateSettingsUI() {
            [15, 30, 45, 60].forEach(v => {
                const btn = document.getElementById('cd-' + v);
                if (cooldownDuration === v) {
                    btn.classList.add('bg-zinc-800', 'text-emerald-400');
                    btn.classList.remove('text-zinc-500');
                } else {
                    btn.classList.remove('bg-zinc-800', 'text-emerald-400');
                    btn.classList.add('text-zinc-500');
                }
            });
            document.getElementById('provider-label').innerText = preferredDialer === 'googlevoice' ? 'Google Voice' : 'Standard';
        }

        // --- Dialer Actions ---
        function appendNum(n) { document.getElementById('phone-input').value += n; }
        function backspace() { 
            const inp = document.getElementById('phone-input');
            inp.value = inp.value.slice(0, -1);
        }
        function setPhone(n) { document.getElementById('phone-input').value = n; }

        function handleDial() {
            const num = document.getElementById('phone-input').value.replace(/\D/g, '');
            if (!num) return;
            if (!preferredDialer) {
                openAppPicker();
                return;
            }
            
            let url = `tel:${num}`;
            if (preferredDialer === 'googlevoice') {
                url = `https://voice.google.com/calls?a=nc,%2B${num}`;
            }

            // Log it
            const lead = leads[currentIdx];
            const logName = (lead && lead.phone === num) ? `${lead.firstName} ${lead.lastName}` : 'Manual Entry';
            callLogs.unshift({
                id: Date.now(),
                phoneNumber: num,
                name: logName,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('kut_callLogs', JSON.stringify(callLogs));

            // State update
            document.getElementById('status-text').innerText = "Dialing Process...";
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-orange-500 animate-pulse";
            
            window.open(url, '_blank');
            startCooldown();
            updateUI();
        }

        function startCooldown() {
            remainingCooldown = cooldownDuration;
            const btn = document.getElementById('btn-dial');
            btn.disabled = true;
            btn.className = "w-full py-5 rounded-3xl flex items-center justify-center gap-3 bg-zinc-900 text-zinc-600 cursor-not-allowed border border-zinc-800 transition-all";
            
            clearInterval(cooldownTimer);
            cooldownTimer = setInterval(() => {
                remainingCooldown--;
                btn.innerHTML = `<i data-lucide="clock" class="w-6 h-6 animate-spin"></i> COOLDOWN ${remainingCooldown}s`;
                lucide.createIcons();
                document.getElementById('status-text').innerText = `Cooldown: ${remainingCooldown}s`;

                if (remainingCooldown <= 0) {
                    clearInterval(cooldownTimer);
                    endCooldown();
                }
            }, 1000);
        }

        function endCooldown() {
            const btn = document.getElementById('btn-dial');
            btn.disabled = false;
            btn.className = "w-full py-5 rounded-3xl flex items-center justify-center gap-3 bg-emerald-500 text-black font-bold text-lg hover:bg-emerald-400 transition-all active:scale-95 shadow-xl";
            btn.innerHTML = `<i data-lucide="phone" class="w-6 h-6 fill-current"></i> PLACE CALL`;
            lucide.createIcons();
            document.getElementById('status-text').innerText = "System Ready";
            document.getElementById('status-dot').className = "w-2 h-2 rounded-full bg-emerald-500";

            if (autoDialEnabled && currentIdx < leads.length - 1) {
                nextLead();
            }
        }

        // --- Lead Management ---
        function nextLead() {
            if (currentIdx < leads.length - 1) {
                currentIdx++;
                localStorage.setItem('kut_currentLeadIdx', currentIdx);
                updateUI();
            }
        }

        function prevLead() {
            if (currentIdx > 0) {
                currentIdx--;
                localStorage.setItem('kut_currentLeadIdx', currentIdx);
                updateUI();
            }
        }

        function clearLeads() {
            leads = [];
            currentIdx = 0;
            localStorage.removeItem('kut_campaignLeads');
            localStorage.setItem('kut_currentLeadIdx', 0);
            updateUI();
        }

        function handleFileUpload(e) {
            const file = e.target.files[0];
            if (!file) return;

            document.getElementById('import-text').innerText = "Reading...";
            const reader = new FileReader();
            reader.onload = function(evt) {
                try {
                    const data = evt.target.result;
                    const workbook = XLSX.read(data, { type: 'binary' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const json = XLSX.utils.sheet_to_json(sheet);

                    const mapped = json.map((row, idx) => {
                        const find = (keys) => {
                            const foundKey = Object.keys(row).find(k => keys.includes(k.toLowerCase().trim().replace(/[^a-z]/g, '')));
                            return foundKey ? row[foundKey] : '';
                        };

                        const fullName = find(['fullname', 'name', 'client', 'leadname', 'customer']);
                        let fName = find(['firstname', 'first', 'fname']);
                        let lName = find(['lastname', 'last', 'lname']);

                        if (!fName && fullName) {
                            const parts = String(fullName).trim().split(/\s+/);
                            fName = parts[0];
                            lName = parts.slice(1).join(' ');
                        }

                        return {
                            id: idx,
                            firstName: fName || String(fullName || ''),
                            lastName: lName || '',
                            phone: String(find(['phone', 'mobile', 'tel', 'number', 'phonenumber', 'cell'])).replace(/\D/g, ''),
                            address: find(['address', 'street', 'location', 'addr', 'city', 'state']),
                            age: find(['age', 'years', 'dob', 'birth'])
                        };
                    }).filter(l => l.phone.length >= 7);

                    leads = mapped;
                    currentIdx = 0;
                    localStorage.setItem('kut_campaignLeads', JSON.stringify(leads));
                    localStorage.setItem('kut_currentLeadIdx', 0);
                    updateUI();
                    document.getElementById('import-text').innerText = "Import XLSX";
                } catch (err) {
                    console.error(err);
                    document.getElementById('import-text').innerText = "Error!";
                }
            };
            reader.readAsBinaryString(file);
        }

        // --- Settings & Tabs ---
        function switchTab(t) {
            activeTab = t;
            ['dialer', 'history', 'settings'].forEach(name => {
                document.getElementById('tab-' + name).classList.add('hide');
                document.getElementById('nav-' + name).classList.remove('active-tab-btn');
                document.getElementById('nav-' + name).classList.remove('active-dial-btn');
            });

            document.getElementById('tab-' + t).classList.remove('hide');
            if (t === 'dialer') {
                document.getElementById('nav-dialer').classList.add('active-dial-btn');
            } else {
                document.getElementById('nav-' + t).classList.add('active-tab-btn');
                document.getElementById('nav-dialer').className = "relative -top-4 w-16 h-16 rounded-full flex items-center justify-center shadow-2xl bg-zinc-800 text-zinc-400";
            }
        }

        function toggleAutoDial() {
            autoDialEnabled = !autoDialEnabled;
            localStorage.setItem('kut_autoDialEnabled', autoDialEnabled);
            updateUI();
        }

        function setCooldown(v) {
            cooldownDuration = v;
            localStorage.setItem('kut_cooldownDuration', v);
            updateSettingsUI();
        }

        function openAppPicker() { document.getElementById('modal-picker').classList.remove('hide'); }
        function closeAppPicker() { document.getElementById('modal-picker').classList.add('hide'); }
        function selectProvider(p) {
            preferredDialer = p;
            localStorage.setItem('kut_preferredDialer', p);
            updateSettingsUI();
            closeAppPicker();
        }

        function clearLogs() {
            callLogs = [];
            localStorage.setItem('kut_callLogs', JSON.stringify([]));
            updateUI();
        }

        function wipeData() {
            if(confirm("Are you sure? This will delete all leads, history, and settings.")) {
                localStorage.clear();
                window.location.reload();
            }
        }

        // Init on load
        window.onload = init;
    </script>
</body>
</html>
