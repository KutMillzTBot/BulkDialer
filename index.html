<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KUT MILLZ | PRO DIALER v10</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap');
        
        :root {
            --safe-top: env(safe-area-inset-top);
            --safe-bottom: env(safe-area-inset-bottom);
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #000;
            color: #fff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-touch { transition: all 0.1s cubic-bezier(0.4, 0, 0.2, 1); cursor: pointer; user-select: none; }
        .btn-touch:active { transform: scale(0.95); opacity: 0.8; }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 300px; }
        .numpad-key { background: #1a1a1c; aspect-ratio: 1/1; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1px solid #333; }
        .numpad-key .num { font-size: 1.8rem; font-weight: 700; color: #fff; }

        .tab-content { display: none; height: 100%; overflow: hidden; }
        .tab-content.active { display: flex; flex-direction: column; }
        
        .nav-icon { color: #52525b; }
        .nav-icon.active { color: #818cf8; background: rgba(99, 102, 241, 0.15); }

        /* Animation for Active Engine */
        .engine-pulse { animation: engine-glow 2s infinite; }
        @keyframes engine-glow {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 15px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #3f3f46; border-radius: 10px; }
        
        .safe-pb { padding-bottom: var(--safe-bottom); }
        .safe-pt { padding-top: var(--safe-top); }
    </style>
</head>
<body class="safe-pt">

    <!-- AUTH LOCK SCREEN -->
    <div id="lockscreen" class="fixed inset-0 z-[2000] bg-black flex flex-col items-center justify-center p-8">
        <div class="text-center mb-10">
            <div class="w-20 h-20 bg-gradient-to-br from-indigo-500 to-indigo-700 rounded-3xl flex items-center justify-center mx-auto mb-4 shadow-2xl">
                <svg class="w-10 h-10 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-2xl font-black italic text-white uppercase tracking-tighter">Kut Millz <span class="text-indigo-500">Pro</span></h1>
            <p class="text-[9px] tracking-[0.4em] text-zinc-500 font-bold mt-1">SECURE ACCESS REQUIRED</p>
        </div>
        
        <div class="flex gap-4 mb-10">
            <div id="pin-1" class="w-3.5 h-3.5 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-2" class="w-3.5 h-3.5 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-3" class="w-3.5 h-3.5 rounded-full border-2 border-zinc-800"></div>
        </div>

        <div class="numpad-grid">
            <button onclick="inputPin('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
            <button onclick="inputPin('2')" class="numpad-key btn-touch"><span class="num">2</span></button>
            <button onclick="inputPin('3')" class="numpad-key btn-touch"><span class="num">3</span></button>
            <button onclick="inputPin('4')" class="numpad-key btn-touch"><span class="num">4</span></button>
            <button onclick="inputPin('5')" class="numpad-key btn-touch"><span class="num">5</span></button>
            <button onclick="inputPin('6')" class="numpad-key btn-touch"><span class="num">6</span></button>
            <button onclick="inputPin('7')" class="numpad-key btn-touch"><span class="num">7</span></button>
            <button onclick="inputPin('8')" class="numpad-key btn-touch"><span class="num">8</span></button>
            <button onclick="inputPin('9')" class="numpad-key btn-touch"><span class="num">9</span></button>
            <button onclick="clearPin()" class="flex items-center justify-center text-zinc-500 btn-touch"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            <button onclick="inputPin('0')" class="numpad-key btn-touch"><span class="num">0</span></button>
        </div>
    </div>

    <!-- CALL DISPATCHER OVERLAY -->
    <div id="providerModal" class="hidden fixed inset-0 z-[3000] bg-black/95 backdrop-blur-md flex items-center justify-center p-4">
        <div class="w-full max-w-sm bg-zinc-900 border border-zinc-800 p-8 rounded-[2.5rem] shadow-2xl">
            <div class="text-center mb-8">
                <span class="text-[9px] font-black text-indigo-400 uppercase tracking-widest bg-indigo-500/10 px-3 py-1 rounded-full border border-indigo-500/20">Ready to Dial</span>
                <h3 id="targetNumber" class="text-3xl font-black text-white mt-4 tracking-tight">---</h3>
                <p id="targetName" class="text-zinc-500 text-[10px] font-bold uppercase mt-1">Lead Identity Awaiting</p>
            </div>
            
            <div class="space-y-4">
                <button onclick="dispatchCall('gv')" class="w-full p-5 rounded-2xl bg-indigo-600 flex items-center justify-between btn-touch shadow-lg shadow-indigo-500/20">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-white/10 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
                        </div>
                        <span class="font-black text-sm uppercase">Google Voice</span>
                    </div>
                    <svg class="w-5 h-5 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <button onclick="dispatchCall('native')" class="w-full p-5 rounded-2xl bg-zinc-800 border border-zinc-700 flex items-center justify-between btn-touch">
                    <div class="flex items-center gap-4">
                        <div class="w-10 h-10 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                        </div>
                        <span class="font-black text-sm uppercase">Carrier Dial</span>
                    </div>
                    <svg class="w-5 h-5 opacity-30" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="3" d="M9 5l7 7-7 7"></path></svg>
                </button>

                <button onclick="cancelCall()" class="w-full pt-4 text-[10px] font-black text-zinc-600 uppercase tracking-widest">Cancel Sequence</button>
            </div>
        </div>
    </div>

    <!-- HEADER -->
    <header class="flex items-center justify-between px-6 py-4 border-b border-zinc-900 bg-black">
        <div>
            <div class="flex items-center gap-2 mb-0.5">
                <div id="statusPulse" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                <span id="statusText" class="text-[9px] font-black uppercase text-emerald-500 tracking-tighter">System Ready</span>
            </div>
            <h2 class="text-xl font-black italic tracking-tighter">KUT MILLZ</h2>
        </div>
        <button onclick="document.getElementById('fileIn').click()" class="bg-indigo-600 text-white text-[10px] font-black px-5 py-3 rounded-xl uppercase btn-touch shadow-lg shadow-indigo-500/20">Import</button>
        <input type="file" id="fileIn" class="hidden" accept=".xlsx,.xls">
    </header>

    <!-- CONTENT -->
    <main class="flex-1 relative overflow-hidden">
        
        <!-- DIALER TAB -->
        <div id="tab-dialer" class="tab-content active">
            <!-- Settings Bar -->
            <div class="flex items-center justify-between p-4 bg-zinc-950/50">
                <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Sequence Queue</h3>
                <div class="flex items-center gap-2 px-3 py-1.5 bg-zinc-900 rounded-lg border border-zinc-800">
                    <span class="text-[9px] font-bold text-zinc-500">WAIT:</span>
                    <input type="number" id="cooldownVal" value="4" class="w-6 bg-transparent text-white text-[10px] font-black text-center outline-none">
                </div>
            </div>

            <!-- List -->
            <div id="queueList" class="flex-1 overflow-y-auto px-4 py-2 space-y-3 custom-scroll">
                <div class="h-full flex flex-col items-center justify-center opacity-20 py-20">
                    <svg class="w-12 h-12 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="1.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                    <p class="text-[10px] font-black uppercase tracking-widest">No leads loaded</p>
                </div>
            </div>

            <!-- Fixed Controls Container -->
            <div class="p-6 bg-gradient-to-t from-black via-black/90 to-transparent">
                <button id="masterToggle" disabled onclick="toggleAutomation()" class="w-full py-5 rounded-2xl bg-zinc-900 text-zinc-600 font-black text-xs uppercase tracking-widest border border-zinc-800 transition-all">Select Batch First</button>
            </div>
        </div>

        <!-- KEYPAD TAB -->
        <div id="tab-keypad" class="tab-content items-center justify-center p-6">
            <div class="w-full max-w-xs">
                <input type="text" id="dialDisplay" readonly class="w-full bg-transparent text-5xl font-black text-center mb-8 outline-none text-white placeholder-zinc-900" placeholder="0">
                <div class="numpad-grid mx-auto mb-10">
                    <button onclick="pressKey('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
                    <button onclick="pressKey('2')" class="numpad-key btn-touch"><span class="num">2</span></button>
                    <button onclick="pressKey('3')" class="numpad-key btn-touch"><span class="num">3</span></button>
                    <button onclick="pressKey('4')" class="numpad-key btn-touch"><span class="num">4</span></button>
                    <button onclick="pressKey('5')" class="numpad-key btn-touch"><span class="num">5</span></button>
                    <button onclick="pressKey('6')" class="numpad-key btn-touch"><span class="num">6</span></button>
                    <button onclick="pressKey('7')" class="numpad-key btn-touch"><span class="num">7</span></button>
                    <button onclick="pressKey('8')" class="numpad-key btn-touch"><span class="num">8</span></button>
                    <button onclick="pressKey('9')" class="numpad-key btn-touch"><span class="num">9</span></button>
                    <button onclick="pressKey('*')" class="numpad-key btn-touch"><span class="num text-indigo-500">*</span></button>
                    <button onclick="pressKey('0')" class="numpad-key btn-touch"><span class="num">0</span></button>
                    <button onclick="pressKey('#')" class="numpad-key btn-touch"><span class="num text-indigo-500">#</span></button>
                </div>
                <div class="flex items-center justify-around px-4">
                    <button onclick="clearDial()" class="text-zinc-600 btn-touch"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg></button>
                    <button onclick="manualDial()" class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center btn-touch shadow-xl shadow-emerald-500/20"><svg class="w-8 h-8 text-white" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg></button>
                    <div class="w-8"></div>
                </div>
            </div>
        </div>

        <!-- REPO TAB -->
        <div id="tab-repo" class="tab-content overflow-y-auto p-6 custom-scroll">
            <h3 class="text-[10px] font-black text-zinc-500 uppercase tracking-[0.3em] mb-6">Storage Vault</h3>
            <div id="batchGrid" class="space-y-4"></div>
        </div>

    </main>

    <!-- NAVIGATION -->
    <nav class="h-24 bg-zinc-950 border-t border-zinc-900 flex items-center justify-around safe-pb px-8">
        <button onclick="switchTab('dialer')" id="btn-dialer" class="nav-icon active p-4 rounded-2xl btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg></button>
        <button onclick="switchTab('keypad')" id="btn-keypad" class="nav-icon p-4 rounded-2xl btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
        <button onclick="switchTab('repo')" id="btn-repo" class="nav-icon p-4 rounded-2xl btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg></button>
    </nav>

    <script>
        const PIN_KEY = "666";
        let inputPinStr = "";
        let leads = [];
        let index = 0;
        let isRunning = false;
        let waitingForFocus = false;
        let pendingLead = null;
        let dialStr = "";
        let repo = JSON.parse(localStorage.getItem('km_v11_vault')) || [];

        function inputPin(n) {
            if (inputPinStr.length < 3) {
                inputPinStr += n;
                document.getElementById(`pin-${inputPinStr.length}`).classList.add('bg-indigo-500', 'border-indigo-500');
                if (inputPinStr.length === 3) {
                    setTimeout(() => inputPinStr === PIN_KEY ? unlock() : clearPin(), 200);
                }
            }
        }
        function clearPin() { 
            inputPinStr = ""; 
            for(let i=1; i<=3; i++) document.getElementById(`pin-${i}`).className = "w-3.5 h-3.5 rounded-full border-2 border-zinc-800";
        }
        function unlock() { 
            const ls = document.getElementById('lockscreen');
            ls.style.transition = 'opacity 0.4s ease';
            ls.style.opacity = '0';
            setTimeout(() => ls.style.display = 'none', 400);
            if(repo.length > 0) renderRepo();
        }

        function startCall(lead) {
            pendingLead = lead;
            const phone = String(lead.phone).replace(/[^0-9+]/g, '');
            document.getElementById('targetNumber').innerText = phone;
            document.getElementById('targetName').innerText = lead.name;
            document.getElementById('providerModal').classList.remove('hidden');
        }

        function dispatchCall(type) {
            const phone = String(pendingLead.phone).replace(/[^0-9+]/g, '');
            document.getElementById('providerModal').classList.add('hidden');
            
            if(type === 'gv') {
                const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
                if (isMobile) {
                    window.location.assign(`googlevoice://call?number=${phone}`);
                } else {
                    window.open(`https://voice.google.com/u/0/calls?number=${phone}`, '_self');
                }
            } else {
                window.location.assign(`tel:${phone}`);
            }

            if (isRunning) {
                waitingForFocus = true;
                updateStatus('PENDING...', 'bg-amber-500 engine-pulse');
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning && waitingForFocus) {
                waitingForFocus = false;
                leads[index].status = 'finished';
                index++;
                renderLeads();
                
                if (index < leads.length) {
                    let wait = parseInt(document.getElementById('cooldownVal').value) || 4;
                    updateStatus(`WAIT ${wait}s`, 'bg-indigo-500');
                    setTimeout(() => { if(isRunning) startCall(leads[index]); }, wait * 1000);
                } else {
                    stopAuto();
                }
            }
        });

        function toggleAutomation() {
            if(!isRunning) {
                isRunning = true;
                const btn = document.getElementById('masterToggle');
                btn.innerText = "ABORT ENGINE";
                btn.className = "w-full py-5 rounded-2xl bg-rose-600 text-white font-black text-xs uppercase tracking-widest shadow-xl shadow-rose-500/30 border-none";
                startCall(leads[index]);
            } else stopAuto();
        }

        function stopAuto() {
            isRunning = false;
            waitingForFocus = false;
            const btn = document.getElementById('masterToggle');
            btn.innerText = "RESUME ENGINE";
            btn.className = "w-full py-5 rounded-2xl bg-indigo-600 text-white font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-500/20 border-none";
            updateStatus('READY', 'bg-emerald-500');
        }

        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`btn-${t}`).classList.add('active');
        }

        document.getElementById('fileIn').addEventListener('change', (e) => {
            const f = e.target.files[0];
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                saveToVault(`BATCH_${new Date().toLocaleTimeString()}`, json);
                loadLeads(json);
            };
            reader.readAsArrayBuffer(f);
        });

        function loadLeads(data) {
            leads = data.map(r => ({ 
                name: r.name || r.Name || "Lead", 
                phone: String(r.phone || r.Phone || ""), 
                status: 'pending' 
            })).filter(l => l.phone.length > 5);
            index = 0;
            renderLeads();
            const btn = document.getElementById('masterToggle');
            btn.disabled = false;
            btn.innerText = "START ENGINE";
            btn.className = "w-full py-5 rounded-2xl bg-indigo-600 text-white font-black text-xs uppercase tracking-widest shadow-xl shadow-indigo-500/20 border-none";
            switchTab('dialer');
        }

        function renderLeads() {
            const list = document.getElementById('queueList');
            list.innerHTML = '';
            leads.forEach((l, i) => {
                const current = i === index;
                const item = document.createElement('div');
                item.className = `p-4 rounded-2xl border flex justify-between items-center transition-all ${current ? 'bg-indigo-600/10 border-indigo-500/50' : 'bg-zinc-900 border-zinc-800 opacity-40'}`;
                item.innerHTML = `
                    <div>
                        <p class="text-[11px] font-black uppercase text-white">${l.name}</p>
                        <p class="text-[9px] font-mono text-zinc-500 mt-0.5">${l.phone}</p>
                    </div>
                    ${l.status === 'finished' ? '<span class="text-[8px] font-black text-emerald-500 bg-emerald-500/10 px-2 py-0.5 rounded border border-emerald-500/20">SENT</span>' : ''}
                `;
                list.appendChild(item);
            });
            if(index > 0) {
                const activeItem = list.children[index];
                if(activeItem) activeItem.scrollIntoView({behavior: 'smooth', block: 'center'});
            }
        }

        function saveToVault(name, data) {
            repo.unshift({ name, data, date: new Date().toLocaleDateString() });
            if(repo.length > 15) repo.pop();
            localStorage.setItem('km_v11_vault', JSON.stringify(repo));
        }

        function renderRepo() {
            const grid = document.getElementById('batchGrid');
            grid.innerHTML = '';
            repo.forEach((b, i) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center";
                card.innerHTML = `
                    <div>
                        <p class="text-[11px] font-black uppercase text-white">${b.name}</p>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase mt-1">${b.data.length} Leads • ${b.date}</p>
                    </div>
                    <button onclick="loadLeads(repo[${i}].data)" class="bg-indigo-600 text-white text-[9px] font-black px-4 py-2 rounded-lg uppercase btn-touch">Load</button>
                `;
                grid.appendChild(card);
            });
        }

        function pressKey(v) { dialStr += v; document.getElementById('dialDisplay').value = dialStr; }
        function clearDial() { dialStr = ""; document.getElementById('dialDisplay').value = "0"; }
        function manualDial() { if(dialStr.length > 5) startCall({name: 'Manual Entry', phone: dialStr}); }
        function updateStatus(txt, cls) { 
            const el = document.getElementById('statusText');
            el.innerText = txt;
            el.className = `text-[9px] font-black uppercase tracking-tighter ${cls.includes('indigo') ? 'text-indigo-400' : cls.includes('amber') ? 'text-amber-500' : 'text-emerald-500'}`;
            document.getElementById('statusPulse').className = `w-2 h-2 rounded-full ${cls}`;
        }
        function cancelCall() { document.getElementById('providerModal').classList.add('hidden'); if(isRunning) stopAuto(); }
    </script>
</body>
</html>
