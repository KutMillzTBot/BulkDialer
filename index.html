<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>KUT MILLZ | PRO DIALER</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        
        :root {
            --primary: #6366f1;
            --bg-dark: #000000;
            --surface: #0a0a0c;
            --border: #1a1a1e;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-dark);
            color: #ffffff;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
            height: 100vh;
            height: -webkit-fill-available;
        }

        .app-container { height: 100vh; display: flex; flex-direction: column; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 1.25rem; }

        .btn-touch { transition: transform 0.1s ease, opacity 0.1s ease; cursor: pointer; user-select: none; }
        .btn-touch:active { transform: scale(0.96); opacity: 0.8; }

        .numpad-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 100%; max-width: 320px; }
        .numpad-key { background: #121215; aspect-ratio: 1/1; border-radius: 50%; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 1px solid #1f1f23; }
        .numpad-key .num { font-size: 1.75rem; font-weight: 600; line-height: 1; }
        .numpad-key .sub { font-size: 0.6rem; color: #52525b; font-weight: 800; margin-top: 2px; }

        .tab-content { display: none; flex: 1; overflow: hidden; }
        .tab-content.active { display: flex; flex-direction: column; }
        .nav-icon.active { color: #818cf8; background: #1e1b4b; }

        .pulse-red { animation: pulse-red 2s infinite; }
        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(99, 102, 241, 0); }
            100% { box-shadow: 0 0 0 0 rgba(99, 102, 241, 0); }
        }
    </style>
</head>
<body>

    <!-- LOCK SCREEN -->
    <div id="lockscreen" class="fixed inset-0 z-[200] bg-black flex flex-col items-center justify-center p-8">
        <div class="mb-12 text-center">
            <div class="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-xl shadow-indigo-500/30">
                <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
            </div>
            <h1 class="text-xl font-extrabold tracking-tighter text-white">KUT MILLZ PRO</h1>
            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-[0.3em] mt-1">DIRECT INJECTION v8.0</p>
        </div>

        <div class="flex gap-4 mb-12">
            <div id="pin-1" class="w-3 h-3 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-2" class="w-3 h-3 rounded-full border-2 border-zinc-800"></div>
            <div id="pin-3" class="w-3 h-3 rounded-full border-2 border-zinc-800"></div>
        </div>

        <div class="numpad-grid">
            <button onclick="inputPin('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
            <button onclick="inputPin('2')" class="numpad-key btn-touch"><span class="num">2</span></button>
            <button onclick="inputPin('3')" class="numpad-key btn-touch"><span class="num">3</span></button>
            <button onclick="inputPin('4')" class="numpad-key btn-touch"><span class="num">4</span></button>
            <button onclick="inputPin('5')" class="numpad-key btn-touch"><span class="num">5</span></button>
            <button onclick="inputPin('6')" class="numpad-key btn-touch"><span class="num">6</span></button>
            <button onclick="inputPin('7')" class="numpad-key btn-touch"><span class="num">7</span></button>
            <button onclick="inputPin('8')" class="numpad-key btn-touch"><span class="num">8</span></button>
            <button onclick="inputPin('9')" class="numpad-key btn-touch"><span class="num">9</span></button>
            <div></div>
            <button onclick="inputPin('0')" class="numpad-key btn-touch"><span class="num">0</span></button>
            <button onclick="clearPin()" class="flex items-center justify-center text-zinc-600 btn-touch">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg>
            </button>
        </div>
    </div>

    <!-- PROVIDER SELECTOR -->
    <div id="providerModal" class="hidden fixed inset-0 z-[300] bg-black/95 backdrop-blur-2xl flex items-center justify-center p-6">
        <div class="w-full max-w-sm panel p-8 border-indigo-500/30">
            <div class="text-center mb-8">
                <h3 class="text-lg font-black text-white uppercase tracking-tight">Outbound Route</h3>
                <p id="targetNumber" class="text-indigo-400 font-mono text-sm mt-2 tracking-widest font-bold">---</p>
            </div>
            
            <div class="space-y-4">
                <button onclick="dispatchCall('native')" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-4 btn-touch">
                    <div class="w-12 h-12 bg-emerald-500/10 text-emerald-500 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg>
                    </div>
                    <div class="text-left">
                        <p class="text-xs font-black text-white uppercase">System Dialer</p>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase">Native Carrier</p>
                    </div>
                </button>

                <button onclick="dispatchCall('gv')" class="w-full p-5 rounded-2xl bg-zinc-900 border border-zinc-800 flex items-center gap-4 btn-touch">
                    <div class="w-12 h-12 bg-indigo-500/10 text-indigo-500 rounded-xl flex items-center justify-center">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg>
                    </div>
                    <div class="text-left">
                        <p class="text-xs font-black text-white uppercase">Google Voice</p>
                        <p class="text-[9px] text-zinc-500 font-bold uppercase">Integrated VoIP</p>
                    </div>
                </button>

                <button onclick="cancelCall()" class="w-full py-4 text-[10px] font-bold text-zinc-600 uppercase tracking-widest btn-touch mt-2">Abort Session</button>
            </div>
        </div>
    </div>

    <!-- MAIN APP -->
    <div id="mainApp" class="hidden app-container opacity-0 transition-opacity duration-500">
        
        <header class="h-20 border-b border-zinc-900 bg-black flex items-center justify-between px-6 shrink-0">
            <div class="flex items-center gap-6">
                <div>
                    <p class="text-[8px] font-black text-zinc-600 uppercase tracking-widest">Engine Status</p>
                    <div class="flex items-center gap-2 mt-1.5">
                        <div id="statusPulse" class="w-2 h-2 rounded-full bg-emerald-500"></div>
                        <span id="statusText" class="text-[10px] font-extrabold text-white uppercase">Standby</span>
                    </div>
                </div>
            </div>
            
            <button onclick="document.getElementById('fileIn').click()" class="bg-indigo-600 px-4 py-2 rounded-lg text-[10px] font-black uppercase tracking-widest btn-touch">Import Batch</button>
            <input type="file" id="fileIn" class="hidden" accept=".xlsx,.xls">
        </header>

        <main class="flex-1 overflow-hidden relative">
            
            <!-- DIALER TAB -->
            <div id="tab-dialer" class="tab-content active p-4 pb-24">
                <div class="mb-4 flex items-center justify-between">
                    <h2 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-500">Live Sequence</h2>
                    <div class="flex items-center gap-2">
                        <span class="text-[10px] text-zinc-600 font-bold">INTERVAL:</span>
                        <input type="number" id="cooldownVal" value="5" class="w-10 bg-zinc-900 border border-zinc-800 text-center text-[10px] text-white py-1 rounded">
                    </div>
                </div>

                <div id="queueList" class="flex-1 overflow-y-auto space-y-2 custom-scroll">
                    <!-- Leads -->
                </div>

                <div class="absolute bottom-6 left-0 right-0 px-6">
                    <button id="masterToggle" disabled onclick="toggleAutomation()" class="w-full bg-zinc-800 py-4 rounded-2xl font-black text-xs uppercase tracking-[0.3em] text-zinc-500 shadow-2xl">Start Engine</button>
                </div>
            </div>

            <!-- KEYPAD TAB -->
            <div id="tab-keypad" class="tab-content items-center justify-center p-8">
                <div class="w-full max-w-xs space-y-8">
                    <div class="text-center">
                        <input type="text" id="dialDisplay" readonly class="w-full bg-transparent text-5xl font-bold text-center text-white outline-none" placeholder="0">
                    </div>
                    <div class="numpad-grid mx-auto">
                        <button onclick="pressKey('1')" class="numpad-key btn-touch"><span class="num">1</span></button>
                        <button onclick="pressKey('2', 'ABC')" class="numpad-key btn-touch"><span class="num">2</span><span class="sub">ABC</span></button>
                        <button onclick="pressKey('3', 'DEF')" class="numpad-key btn-touch"><span class="num">3</span><span class="sub">DEF</span></button>
                        <button onclick="pressKey('4', 'GHI')" class="numpad-key btn-touch"><span class="num">4</span><span class="sub">GHI</span></button>
                        <button onclick="pressKey('5', 'JKL')" class="numpad-key btn-touch"><span class="num">5</span><span class="sub">JKL</span></button>
                        <button onclick="pressKey('6', 'MNO')" class="numpad-key btn-touch"><span class="num">6</span><span class="sub">MNO</span></button>
                        <button onclick="pressKey('7', 'PQRS')" class="numpad-key btn-touch"><span class="num">7</span><span class="sub">PQRS</span></button>
                        <button onclick="pressKey('8', 'TUV')" class="numpad-key btn-touch"><span class="num">8</span><span class="sub">TUV</span></button>
                        <button onclick="pressKey('9', 'WXYZ')" class="numpad-key btn-touch"><span class="num">9</span><span class="sub">WXYZ</span></button>
                        <button onclick="pressKey('*')" class="numpad-key btn-touch"><span class="num">*</span></button>
                        <button onclick="pressKey('0', '+')" class="numpad-key btn-touch"><span class="num">0</span><span class="sub">+</span></button>
                        <button onclick="pressKey('#')" class="numpad-key btn-touch"><span class="num">#</span></button>
                    </div>
                    <div class="flex justify-center gap-12 pt-4">
                        <button onclick="clearDial()" class="w-12 h-12 flex items-center justify-center text-zinc-700 btn-touch"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2M3 12l6.414 6.414a2 2 0 001.414.586H19a2 2 0 002-2V7a2 2 0 00-2-2h-8.172a2 2 0 00-1.414.586L3 12z"></path></svg></button>
                        <button onclick="manualDial()" class="w-20 h-20 bg-emerald-500 rounded-full flex items-center justify-center text-white shadow-xl shadow-emerald-500/30 btn-touch"><svg class="w-10 h-10" fill="currentColor" viewBox="0 0 20 20"><path d="M2 3a1 1 0 011-1h2.153a1 1 0 01.986.836l.74 4.435a1 1 0 01-.54 1.06l-1.548.773a11.037 11.037 0 006.105 6.105l.774-1.548a1 1 0 011.059-.54l4.435.74a1 1 0 01.836.986V17a1 1 0 01-1 1h-2C7.82 18 2 12.18 2 5V3z"></path></svg></button>
                    </div>
                </div>
            </div>

            <!-- REPO TAB -->
            <div id="tab-repo" class="tab-content p-6">
                <h2 class="text-sm font-black uppercase text-white mb-6">Cloud Archives</h2>
                <div id="batchGrid" class="grid grid-cols-1 gap-4 overflow-y-auto"></div>
            </div>

        </main>

        <nav class="h-20 bg-zinc-950 border-t border-zinc-900 flex items-center justify-around pb-safe">
            <button onclick="switchTab('dialer')" id="btn-dialer" class="nav-icon active p-4 rounded-2xl text-zinc-500 btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path></svg></button>
            <button onclick="switchTab('keypad')" id="btn-keypad" class="nav-icon p-4 rounded-2xl text-zinc-500 btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg></button>
            <button onclick="switchTab('repo')" id="btn-repo" class="nav-icon p-4 rounded-2xl text-zinc-500 btn-touch"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M5 8h14M5 8a2 2 0 110-4h14a2 2 0 110 4M5 8v10a2 2 0 002 2h10a2 2 0 002-2V8m-9 4h4"></path></svg></button>
        </nav>
    </div>

    <script>
        // Engine State
        let pin = "";
        const correctPin = "666";
        let leads = [];
        let index = 0;
        let isRunning = false;
        let waitingForFocus = false;
        let cooldownTimer = null;
        let pendingPhone = "";
        let dialStr = "";
        let repo = JSON.parse(localStorage.getItem('km_repo_v8')) || [];

        // Auth
        function inputPin(n) {
            if (pin.length < 3) {
                pin += n;
                document.getElementById(`pin-${pin.length}`).classList.add('bg-indigo-500', 'border-indigo-500');
                if (pin.length === 3) setTimeout(() => pin === correctPin ? unlock() : clearPin(), 200);
            }
        }
        function clearPin() { pin = ""; for(let i=1; i<=3; i++) document.getElementById(`pin-${i}`).className = "w-3 h-3 rounded-full border-2 border-zinc-800"; }
        function unlock() { document.getElementById('lockscreen').style.display = 'none'; document.getElementById('mainApp').classList.remove('hidden'); setTimeout(() => document.getElementById('mainApp').style.opacity = '1', 10); }

        // Routing Logic
        function startCall(phone) {
            pendingPhone = String(phone).replace(/[^0-9+]/g, '');
            document.getElementById('targetNumber').innerText = pendingPhone;
            document.getElementById('providerModal').classList.remove('hidden');
        }

        function dispatchCall(type) {
            document.getElementById('providerModal').classList.add('hidden');
            
            // INTEGRATED INJECTION: Use current location assignment to prevent new tabs
            // Browsers will automatically switch to the registered handler (Phone App or Google Voice)
            if(type === 'gv') {
                window.location.assign(`https://voice.google.com/u/0/calls?number=${pendingPhone}`);
            } else {
                window.location.assign(`tel:${pendingPhone}`);
            }

            if (isRunning) {
                waitingForFocus = true;
                updateStatus('Awaiting Line', 'bg-amber-500');
            }
        }

        function cancelCall() { document.getElementById('providerModal').classList.add('hidden'); if(isRunning) stopAuto(); }

        // Resume listener
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && isRunning && waitingForFocus) {
                waitingForFocus = false;
                leads[index].status = 'complete';
                index++;
                renderLeads();
                if (index < leads.length) startCooldown();
                else stopAuto();
            }
        });

        function startCooldown() {
            let s = parseInt(document.getElementById('cooldownVal').value) || 5;
            updateStatus(`Next in ${s}s`, 'bg-indigo-500 pulse-red');
            cooldownTimer = setInterval(() => {
                s--;
                updateStatus(`Next in ${s}s`, 'bg-indigo-500 pulse-red');
                if (s <= 0) { clearInterval(cooldownTimer); if(isRunning) startCall(leads[index].phone); }
            }, 1000);
        }

        function toggleAutomation() {
            if(!isRunning) {
                isRunning = true;
                document.getElementById('masterToggle').innerText = "HALT SEQUENCE";
                document.getElementById('masterToggle').className = "w-full bg-rose-600 py-4 rounded-2xl font-black text-xs uppercase text-white shadow-2xl";
                startCall(leads[index].phone);
            } else stopAuto();
        }

        function stopAuto() {
            isRunning = false;
            waitingForFocus = false;
            clearInterval(cooldownTimer);
            document.getElementById('masterToggle').innerText = "RESUME ENGINE";
            document.getElementById('masterToggle').className = "w-full bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase text-white shadow-2xl";
            updateStatus('Standby', 'bg-emerald-500');
        }

        // Tabs & Files
        function switchTab(t) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.nav-icon').forEach(el => el.classList.remove('active'));
            document.getElementById(`tab-${t}`).classList.add('active');
            document.getElementById(`btn-${t}`).classList.add('active');
            if(t === 'repo') renderRepo();
        }

        document.getElementById('fileIn').addEventListener('change', (e) => {
            const f = e.target.files[0];
            if(!f) return;
            const reader = new FileReader();
            reader.onload = (evt) => {
                const data = new Uint8Array(evt.target.result);
                const wb = XLSX.read(data, {type:'array'});
                const json = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]]);
                saveBatch(`BATCH_${Date.now().toString().slice(-4)}`, json);
                loadLeads(json);
            };
            reader.readAsArrayBuffer(f);
        });

        function loadLeads(data) {
            leads = data.map(r => ({ name: r.name || r.Name || "Lead", phone: String(r.phone || r.Phone || ""), status: 'pending' })).filter(l => l.phone.length > 5);
            index = 0;
            renderLeads();
            document.getElementById('masterToggle').disabled = false;
            document.getElementById('masterToggle').className = "w-full bg-indigo-600 py-4 rounded-2xl font-black text-xs uppercase text-white shadow-2xl";
            switchTab('dialer');
        }

        function renderLeads() {
            const list = document.getElementById('queueList');
            list.innerHTML = '';
            leads.forEach((l, i) => {
                const isActive = i === index;
                const row = document.createElement('div');
                row.className = `p-4 rounded-xl border flex justify-between items-center ${isActive ? 'bg-indigo-600/10 border-indigo-500' : 'bg-zinc-950 border-zinc-900 opacity-50'}`;
                row.innerHTML = `<div><p class="text-[10px] font-black uppercase text-white">${l.name}</p><p class="text-[10px] text-zinc-500 font-mono">${l.phone}</p></div>`;
                list.appendChild(row);
            });
        }

        function saveBatch(name, data) { repo.push({ name, data, id: Date.now() }); localStorage.setItem('km_repo_v8', JSON.stringify(repo)); }
        function renderRepo() {
            const grid = document.getElementById('batchGrid');
            grid.innerHTML = '';
            repo.forEach((b, i) => {
                const card = document.createElement('div');
                card.className = "bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center";
                card.innerHTML = `<div><p class="text-xs font-black text-white uppercase">${b.name}</p><p class="text-[10px] text-zinc-500 font-bold">${b.data.length} Records</p></div><button onclick="loadLeads(repo[${i}].data)" class="bg-white text-black text-[9px] font-black px-4 py-2 rounded-lg uppercase">Load</button>`;
                grid.appendChild(card);
            });
        }

        function pressKey(v) { dialStr += v; document.getElementById('dialDisplay').value = dialStr; }
        function clearDial() { dialStr = ""; document.getElementById('dialDisplay').value = "0"; }
        function manualDial() { if(dialStr.length > 2) startCall(dialStr); }
        function updateStatus(txt, cls) { document.getElementById('statusText').innerText = txt; document.getElementById('statusPulse').className = `w-2 h-2 rounded-full ${cls}`; }
    </script>
</body>
</html>
